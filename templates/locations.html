{% extends "base.html" %}
{% block title %}Locations | {{ client_name or "Echo Audit" }}{% endblock %}

{% block extra_css %}
<style>
  /* Tab strip uses .tabs / .tab-btn from app.css. Just a touch of breathing
     room between the bar and the panels. */
  #locs-tabs                 { margin-top: 4px; }
  #locs-tabs .tabs           { margin-bottom: 14px; }

  /* ── Tab panels ──────────────────────────────────────── */
  #locations-panel,
  #phone-routings-panel      { padding: 20px 22px; }

  /* ── Locations search bar ────────────────────────────── */
  .loc-search-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .loc-search-input          { flex: 1; max-width: 360px; }
  .loc-search-meta           { color: var(--muted); font-size: 0.82rem; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Locations</div>
    <div class="page-subtitle">
      Manage your office locations and the phone routings that map calls to them.
    </div>
  </div>
</div>

<div id="locs-tabs" data-tabs>
  <div class="tabs">
    <button type="button" class="tab-btn" data-tab="locations">Locations</button>
    <button type="button" class="tab-btn" data-tab="phone-routings">Phone Routings</button>
  </div>

  <section class="tab-panel" data-tab-panel="locations">
    <section class="panel" id="locations-panel">
      <div id="locations-mount">
        <div class="skeleton" style="height:18px;margin:8px 0;"></div>
        <div class="skeleton" style="height:18px;margin:8px 0;"></div>
        <div class="skeleton" style="height:18px;margin:8px 0;"></div>
      </div>
    </section>
  </section>

  <section class="tab-panel" data-tab-panel="phone-routings" hidden>
    <section class="panel" id="phone-routings-panel">
      <div id="phone-routings-mount">
        <div class="skeleton" style="height:18px;margin:8px 0;"></div>
        <div class="skeleton" style="height:18px;margin:8px 0;"></div>
      </div>
    </section>
  </section>
</div>
{% endblock %}

{% block extra_js %}
<script defer src="{{ url_for('static', filename='tabs.js') }}?v={{ static_v('tabs.js') }}"></script>
<script defer src="{{ url_for('static', filename='bulk_export_modal.js') }}?v={{ static_v('bulk_export_modal.js') }}"></script>
<script>
(function () {
  "use strict";
  const EA = window.EA;
  const $ = (s) => document.querySelector(s);

  // Shared cache: Phone Routings need Locations for the location dropdown.
  // Could re-fetch per tab activation, but locations are small and stable
  // enough that one shared cache across both tabs is simpler.
  const cache = { locations: [], phoneRoutings: [] };

  let tabsHandle           = null;
  let locationsMounted     = false;
  let phoneRoutingsMounted = false;
  let locationSearchTerm   = "";

  // ── Boot ─────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", init);

  function init() {
    initTabs();
  }

  function initTabs() {
    const container = document.getElementById("locs-tabs");
    if (!container || !window.EA || !EA.Tabs) return;
    tabsHandle = EA.Tabs.init({
      container:  container,
      defaultTab: "locations",
      onActivate: function (name) {
        if (name === "locations"      && !locationsMounted)     mountLocationsTab();
        if (name === "phone-routings" && !phoneRoutingsMounted) mountPhoneRoutingsTab();
      },
    });
  }

  // ── Locations tab (lazy) ─────────────────────────────────
  // Shell renders ONCE (search row + table container + bulk-upload panel);
  // only the table container re-renders on search input or after CRUD.
  // Keeps the search input focused while typing.
  function mountLocationsTab() {
    locationsMounted = true;
    const mount = document.getElementById("locations-mount");
    if (!mount) return;

    mount.innerHTML =
      '<div class="loc-search-row">' +
        '<input type="search" id="loc-search" class="field-input loc-search-input" ' +
               'placeholder="Search by name or phone…">' +
        '<span class="loc-search-meta" id="loc-search-meta"></span>' +
        '<span class="spacer"></span>' +
        '<button type="button" class="btn btn-primary btn-sm" id="btn-add-location">Add location</button>' +
      '</div>' +
      '<div id="loc-table-container">' +
        '<div class="skeleton" style="height:18px;margin:8px 0;"></div>' +
        '<div class="skeleton" style="height:18px;margin:8px 0;"></div>' +
      '</div>' +
      bulkUploadHtml();

    document.getElementById("loc-search").addEventListener("input", function (e) {
      locationSearchTerm = e.target.value;
      renderLocationsTable();
    });
    document.getElementById("btn-add-location").addEventListener("click", onAddLocation);
    wireBulkUpload();

    loadLocations();
  }

  async function loadLocations() {
    const container = document.getElementById("loc-table-container");
    if (!container) return;
    try {
      cache.locations = await EA.fetchJSON("/api/locations") || [];
      renderLocationsTable();
    } catch (err) {
      container.innerHTML = '<div class="section-error">' +
        EA.esc(err.message || "Failed to load locations.") + '</div>';
    }
  }

  function renderLocationsTable() {
    const container = document.getElementById("loc-table-container");
    if (!container) return;

    const total = cache.locations.length;
    const term  = (locationSearchTerm || "").trim().toLowerCase();
    const filtered = term
      ? cache.locations.filter(function (l) {
          const hay = (l.location_name || "") + " " + (l.location_phone || "");
          return hay.toLowerCase().indexOf(term) !== -1;
        })
      : cache.locations;

    const meta = document.getElementById("loc-search-meta");
    if (meta) meta.textContent = term
      ? (filtered.length + ' of ' + total + ' shown')
      : (total + ' total');

    if (!total) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div style="margin-bottom:10px;">No locations yet. Add one to get started.</div>' +
          '<button type="button" class="btn btn-primary btn-sm" id="btn-add-location-empty">Add location</button>' +
        '</div>';
      const emptyBtn = document.getElementById("btn-add-location-empty");
      if (emptyBtn) emptyBtn.onclick = onAddLocation;
      return;
    }
    if (!filtered.length) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div>No locations match “' + EA.esc(locationSearchTerm) + '”.</div>' +
        '</div>';
      return;
    }

    const rows = filtered.map(function (l) {
      const total    = l.total_calls    || 0;
      const graded   = l.graded_count   || 0;
      const noAnswer = l.no_answer_count || 0;
      const avgPill  = (l.avg_score != null)
        ? '<span class="score-pill ' + EA.scoreClass(l.avg_score) + '">' +
            EA.formatScore(l.avg_score) + '</span>'
        : '—';
      const lastCall = l.last_call_date ? EA.formatRelativeTime(l.last_call_date) : "—";
      const mutedStyle = ' style="color: var(--muted);"';
      const warnStyle  = ' style="color: var(--warning);"';
      return (
        '<tr data-id="' + l.location_id + '">' +
          '<td>' + EA.esc(l.location_name) + '</td>' +
          '<td>' + EA.esc(l.location_phone || "—") + '</td>' +
          '<td>' + EA.esc(EA.formatDate(l.location_engagement_date) || "—") + '</td>' +
          '<td style="text-align:right;">' +
            (total === 0 ? '<span' + mutedStyle + '>0</span>' : total) +
          '</td>' +
          '<td style="text-align:right;">' +
            (graded === 0 ? '<span' + mutedStyle + '>0</span>' : graded) +
          '</td>' +
          '<td style="text-align:right;">' +
            (noAnswer === 0
              ? '<span' + mutedStyle + '>0</span>'
              : '<span' + warnStyle  + '>' + noAnswer + '</span>') +
          '</td>' +
          '<td style="text-align:right;">' + avgPill + '</td>' +
          '<td>' + EA.esc(lastCall) + '</td>' +
          '<td style="text-align:right;">' +
            '<button type="button" class="btn btn-ghost btn-sm loc-export" data-id="' + l.location_id + '" data-name="' + EA.esc(l.location_name) + '">↓ Export Calls</button>' +
            '<button type="button" class="btn btn-ghost btn-sm loc-edit" data-id="' + l.location_id + '">Edit</button>' +
            '<button type="button" class="btn btn-ghost btn-sm loc-delete" data-id="' + l.location_id + '">Delete</button>' +
          '</td>' +
        '</tr>'
      );
    }).join("");
    container.innerHTML =
      '<table class="history-table"><thead><tr>' +
        '<th>Name</th><th>Phone</th><th>First contact</th>' +
        '<th style="text-align:right;">Total</th>' +
        '<th style="text-align:right;">Graded</th>' +
        '<th style="text-align:right;">No-answer</th>' +
        '<th style="text-align:right;">Avg score</th>' +
        '<th>Last call</th>' +
        '<th></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
    container.querySelectorAll(".loc-edit").forEach(function (b) {
      b.onclick = function () { onEditLocation(b.dataset.id); };
    });
    container.querySelectorAll(".loc-delete").forEach(function (b) {
      b.onclick = function () { onDeleteLocation(b.dataset.id); };
    });
    container.querySelectorAll(".loc-export").forEach(function (b) {
      b.onclick = function () {
        EA.BulkExportModal.open({
          locationId:    parseInt(b.dataset.id, 10),
          locationName:  b.dataset.name,
          lockedProject: false,
        });
      };
    });
  }

  async function onAddLocation() {
    const data = await EA.formDialog({
      title: "Add location",
      fields: [
        { name:"location_name",  label:"Name", required:true },
        { name:"location_phone", label:"Phone" },
        { name:"location_engagement_date", label:"First contact date", type:"date" },
      ],
      okLabel: "Create",
    });
    if (!data) return;
    try {
      await EA.fetchJSON("/api/locations", { method:"POST", body: data });
      await loadLocations();
      EA.toast("Location added.", "success");
    } catch (err) { EA.toast(err.message || "Create failed", "error"); }
  }

  async function onEditLocation(id) {
    const loc = cache.locations.find(function (x) { return String(x.location_id) === String(id); });
    if (!loc) return;
    const data = await EA.formDialog({
      title: "Edit location",
      fields: [
        { name:"location_name",  label:"Name", required:true, value: loc.location_name },
        { name:"location_phone", label:"Phone", value: loc.location_phone },
        { name:"location_engagement_date", label:"First contact date", type:"date",
          value: loc.location_engagement_date ? String(loc.location_engagement_date).slice(0,10) : "" },
      ],
    });
    if (!data) return;
    try {
      await EA.fetchJSON("/api/locations/" + encodeURIComponent(id), { method:"PUT", body: data });
      await loadLocations();
      EA.toast("Location saved.", "success");
    } catch (err) { EA.toast(err.message || "Save failed", "error"); }
  }

  async function onDeleteLocation(id) {
    let impact;
    try {
      impact = await EA.fetchJSON("/api/locations/" + encodeURIComponent(id) + "/deletion-impact");
    } catch (err) {
      EA.toast("Couldn't check deletion impact. Try again.", "error");
      return;
    }
    const counts   = impact.counts || {};
    const rubrics  = counts.rubrics  || 0;
    const projects = counts.projects || 0;
    const name = impact.name || "this location";

    let ok;
    if (rubrics > 0 || projects > 0) {
      const parts = [];
      if (rubrics  > 0) parts.push(rubrics  + " rubric"  + (rubrics  === 1 ? "" : "s"));
      if (projects > 0) parts.push(projects + " project" + (projects === 1 ? "" : "s"));
      ok = await EA.strongConfirmDialog({
        title: "Delete location?",
        intro: '"' + name + '" has ' + parts.join(" and ") +
               " attached. Deleting it will hide them from the list and they will no longer " +
               "appear in reports for this location.",
        requiredPhrase: name,
        promptLabel: "Type the location name to confirm:",
        okLabel: "Delete",
        variant: "danger",
      });
    } else {
      ok = await EA.confirmDialog({
        title: "Delete location?",
        body:  '"' + name + '" has no rubrics or projects. This removes it from the list.',
        okLabel: "Delete",
        variant: "danger",
      });
    }
    if (!ok) return;
    try {
      await EA.fetchJSON("/api/locations/" + encodeURIComponent(id), { method:"DELETE" });
      await loadLocations();
      EA.toast("Location deleted.", "success");
    } catch (err) { EA.toast(err.message || "Delete failed", "error"); }
  }

  // ── Bulk upload ─────────────────────────────────────────
  // Lifted verbatim from settings.html (lines 625-749 pre-Phase-6b). Wired
  // once when the Locations tab mounts; the shell containing the panel
  // never re-renders so listeners stay live.
  function bulkUploadHtml() {
    return (
      '<div class="panel" id="bulk-upload-panel" ' +
           'style="margin-top:14px; padding:14px; border:1px dashed var(--border); border-radius:var(--radius-lg);">' +
        '<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">' +
          '<div>' +
            '<div class="panel-title" style="margin:0 0 2px;">Bulk upload locations</div>' +
            '<div class="muted text-small">' +
              'Upload a CSV or Excel file with columns: Name, Phone, First Contact Date' +
            '</div>' +
          '</div>' +
          '<a href="#" id="bulk-template-link" class="text-small">Download template</a>' +
        '</div>' +
        '<div class="hstack-wrap" style="margin-top:10px; gap:8px;">' +
          '<input type="file" id="bulk-file" accept=".csv,.xlsx,.xls" style="flex:1; min-width:220px;">' +
          '<button type="button" class="btn btn-primary btn-sm" id="btn-bulk-upload" disabled>Upload</button>' +
        '</div>' +
        '<div id="bulk-file-meta" class="muted text-small" style="margin-top:6px;" hidden></div>' +
        '<div id="bulk-results" style="margin-top:10px;" hidden></div>' +
      '</div>'
    );
  }

  function wireBulkUpload() {
    const panel = document.getElementById("bulk-upload-panel");
    if (!panel) return;

    const fileInput = document.getElementById("bulk-file");
    const uploadBtn = document.getElementById("btn-bulk-upload");
    const meta      = document.getElementById("bulk-file-meta");
    const results   = document.getElementById("bulk-results");
    const tmplLink  = document.getElementById("bulk-template-link");

    tmplLink.addEventListener("click", function (e) {
      e.preventDefault();
      const csv =
        "Location Name,Phone Number,First Contact Date\n" +
        "Example Property,555-123-4567,2026-01-15\n";
      const url = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
      const a = document.createElement("a");
      a.href = url;
      a.download = "locations_template.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    fileInput.addEventListener("change", function () {
      results.hidden = true;
      results.innerHTML = "";
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        meta.hidden = true;
        uploadBtn.disabled = true;
        return;
      }
      const okExt = /\.(csv|xlsx|xls)$/i.test(file.name);
      if (!okExt) {
        meta.hidden = false;
        meta.innerHTML =
          '<span style="color:var(--danger,#e5484d);">' +
          'Unsupported file type. Please upload a CSV or Excel file.</span>';
        uploadBtn.disabled = true;
        return;
      }
      const kb = (file.size / 1024).toFixed(1);
      meta.hidden = false;
      meta.textContent = file.name + " (" + kb + " KB)";
      uploadBtn.disabled = false;
    });

    uploadBtn.addEventListener("click", async function () {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append("file", file);

      uploadBtn.disabled = true;
      const origLabel = uploadBtn.textContent;
      uploadBtn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Uploading…';
      results.hidden = false;
      results.innerHTML = '<div class="skeleton" style="height:18px;margin:6px 0;"></div>' +
                          '<div class="skeleton" style="height:18px;margin:6px 0;"></div>';

      try {
        const resp = await EA.fetchJSON("/api/locations/bulk-upload", {
          method: "POST", body: fd,
        });
        renderBulkResults(resp);
        const total = (resp.created || 0) + (resp.updated || 0);
        if ((resp.errors || []).length === 0) {
          await loadLocations();
          EA.toast("Upload complete — " + total + " location" +
                   (total === 1 ? "" : "s") + " added.", "success");
        } else {
          EA.toast("Upload finished with " + resp.errors.length +
                   " error" + (resp.errors.length === 1 ? "" : "s") + ".", "error");
        }
        fileInput.value = "";
        meta.hidden = true;
      } catch (err) {
        results.hidden = false;
        results.innerHTML = '<div style="color:var(--danger,#e5484d);">' +
                            EA.esc(err.message || "Upload failed.") + '</div>';
        EA.toast(err.message || "Upload failed.", "error");
      } finally {
        uploadBtn.textContent = origLabel;
        uploadBtn.disabled = !(fileInput.files && fileInput.files[0]);
      }
    });
  }

  function renderBulkResults(resp) {
    const results = document.getElementById("bulk-results");
    const parts = [];
    if (resp.created) {
      parts.push(
        '<div style="color:var(--success,#30a46c); margin:4px 0;">' +
        '✓ ' + resp.created + ' location' + (resp.created === 1 ? "" : "s") + ' created</div>'
      );
    }
    if (resp.updated) {
      parts.push(
        '<div style="color:var(--accent,#3b82f6); margin:4px 0;">' +
        'ℹ ' + resp.updated + ' location' + (resp.updated === 1 ? "" : "s") + ' updated</div>'
      );
    }
    (resp.warnings || []).forEach(function (w) {
      parts.push(
        '<div style="color:#d97706; margin:4px 0;" class="text-small">' +
        '⚠ Row ' + w.row + ' — ' + EA.esc(w.location_name || "") + ': ' +
        EA.esc(w.message || "") + '</div>'
      );
    });
    (resp.errors || []).forEach(function (err) {
      parts.push(
        '<div style="color:var(--danger,#e5484d); margin:4px 0;" class="text-small">' +
        '✕ Row ' + err.row + ' — ' + EA.esc(err.message || "") + '</div>'
      );
    });
    if (!parts.length) {
      parts.push('<div class="muted text-small">No rows processed.</div>');
    }
    results.innerHTML = parts.join("");
    results.hidden = false;
  }

  // ── Phone Routings tab (lazy) ────────────────────────────
  // Shell + table-container same pattern as Locations (no search yet — 10-50
  // rows fit on screen). cache.locations populated lazily for the dropdown.
  function mountPhoneRoutingsTab() {
    phoneRoutingsMounted = true;
    const mount = document.getElementById("phone-routings-mount");
    if (!mount) return;

    mount.innerHTML =
      '<div class="hstack-wrap" style="margin-bottom:10px;">' +
        '<span class="muted text-small">' +
          'Phone routings group inbound numbers under a parent location.' +
        '</span>' +
        '<span class="spacer"></span>' +
        '<button type="button" class="btn btn-primary btn-sm" id="btn-add-phone-routing">Add phone routing</button>' +
      '</div>' +
      '<div id="phr-table-container">' +
        '<div class="skeleton" style="height:18px;margin:8px 0;"></div>' +
      '</div>';

    document.getElementById("btn-add-phone-routing").addEventListener("click", onAddPhoneRouting);

    loadPhoneRoutings();
    if (!cache.locations.length) loadLocations();
  }

  async function loadPhoneRoutings() {
    const container = document.getElementById("phr-table-container");
    if (!container) return;
    try {
      cache.phoneRoutings = await EA.fetchJSON("/api/phone_routing") || [];
      renderPhoneRoutingsTable();
    } catch (err) {
      container.innerHTML = '<div class="section-error">' +
        EA.esc(err.message || "Failed to load phone routings.") + '</div>';
    }
  }

  function renderPhoneRoutingsTable() {
    const container = document.getElementById("phr-table-container");
    if (!container) return;
    if (!cache.phoneRoutings.length) {
      container.innerHTML = '<div class="empty-state">No phone routings yet.</div>';
      return;
    }
    const rows = cache.phoneRoutings.map(function (phr) {
      return (
        '<tr data-id="' + phr.phone_routing_id + '">' +
          '<td>' + EA.esc(phr.phone_routing_name) + '</td>' +
          '<td>' + EA.esc(phr.location_name || "—") + '</td>' +
          '<td style="text-align:right;">' +
            '<button type="button" class="btn btn-ghost btn-sm phr-edit" data-id="' + phr.phone_routing_id + '">Edit</button>' +
            '<button type="button" class="btn btn-ghost btn-sm phr-delete" data-id="' + phr.phone_routing_id + '">Delete</button>' +
          '</td>' +
        '</tr>'
      );
    }).join("");
    container.innerHTML =
      '<table class="history-table"><thead><tr>' +
        '<th>Name</th><th>Location</th><th></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
    container.querySelectorAll(".phr-edit").forEach(function (b) {
      b.onclick = function () { onEditPhoneRouting(b.dataset.id); };
    });
    container.querySelectorAll(".phr-delete").forEach(function (b) {
      b.onclick = function () { onDeletePhoneRouting(b.dataset.id); };
    });
  }

  function locationOptions() {
    return cache.locations.map(function (l) {
      return { value: l.location_id, label: l.location_name };
    });
  }

  async function onAddPhoneRouting() {
    if (!cache.locations.length) {
      EA.toast("Add a location first.", "error");
      return;
    }
    const data = await EA.formDialog({
      title: "Add phone routing",
      fields: [
        { name:"phone_routing_name", label:"Name", required:true },
        { name:"location_id", label:"Location", type:"select", required:true,
          options: locationOptions() },
      ],
      okLabel: "Create",
    });
    if (!data) return;
    try {
      await EA.fetchJSON("/api/phone_routing", {
        method: "POST",
        body: { phone_routing_name: data.phone_routing_name, location_id: parseInt(data.location_id, 10) },
      });
      await loadPhoneRoutings();
      EA.toast("Phone routing added.", "success");
    } catch (err) { EA.toast(err.message || "Create failed", "error"); }
  }

  async function onEditPhoneRouting(id) {
    const phr = cache.phoneRoutings.find(function (x) { return String(x.phone_routing_id) === String(id); });
    if (!phr) return;
    const data = await EA.formDialog({
      title: "Edit phone routing",
      fields: [{ name:"phone_routing_name", label:"Name", required:true, value: phr.phone_routing_name }],
    });
    if (!data) return;
    try {
      await EA.fetchJSON("/api/phone_routing/" + encodeURIComponent(id), {
        method: "PUT", body: { phone_routing_name: data.phone_routing_name },
      });
      await loadPhoneRoutings();
      EA.toast("Phone routing saved.", "success");
    } catch (err) { EA.toast(err.message || "Save failed", "error"); }
  }

  async function onDeletePhoneRouting(id) {
    let impact;
    try {
      impact = await EA.fetchJSON("/api/phone_routing/" + encodeURIComponent(id) + "/deletion-impact");
    } catch (err) {
      EA.toast("Couldn't check deletion impact. Try again.", "error");
      return;
    }
    const projects = (impact.counts && impact.counts.projects) || 0;
    const name = impact.name || "this phone routing";

    let ok;
    if (projects > 0) {
      ok = await EA.strongConfirmDialog({
        title: "Delete phone routing?",
        intro: projects + " project" + (projects === 1 ? " is" : "s are") +
               ' attached to "' + name + '". Deleting the phone routing will hide ' +
               (projects === 1 ? "it" : "them") + " from the list and remove " +
               (projects === 1 ? "it" : "them") + " from this phone routing's reports.",
        requiredPhrase: name,
        promptLabel: "Type the phone routing name to confirm:",
        okLabel: "Delete",
        variant: "danger",
      });
    } else {
      ok = await EA.confirmDialog({
        title: "Delete phone routing?",
        body:  '"' + name + '" has no projects. This removes it from the list.',
        okLabel: "Delete",
        variant: "danger",
      });
    }
    if (!ok) return;
    try {
      await EA.fetchJSON("/api/phone_routing/" + encodeURIComponent(id), { method:"DELETE" });
      await loadPhoneRoutings();
      EA.toast("Phone routing deleted.", "success");
    } catch (err) { EA.toast(err.message || "Delete failed", "error"); }
  }
})();
</script>
{% endblock %}
